name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/htsg
      AUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      HTSG_DATA_MODE: mock
      AUTH_ALLOW_DEV_CREDENTIALS: true
      CRON_SECRET: ci-cron-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build